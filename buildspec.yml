version: 0.2

env:
  variables:
    REPOSITORY_URI: 545750752197.dkr.ecr.us-east-1.amazonaws.com/meu-site

phases:
  pre_build:
    commands:
      - echo "Logando no ECR..."
      - aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin $(echo $REPOSITORY_URI | cut -d'/' -f1)

  build:
    commands:
      - echo "Gerando tag única..."
      - IMAGE_TAG=$(date +%s)

      - echo "Buildando imagem..."
      - docker build -t $REPOSITORY_URI:$IMAGE_TAG .

  post_build:
    commands:
      - echo "Enviando imagem..."
      - docker push $REPOSITORY_URI:$IMAGE_TAG

      - echo "Gerando imagedefinitions.json..."
      - printf '[{"name":"meu-site-service-ixw60vwm","imageUri":"%s"}]' $REPOSITORY_URI:$IMAGE_TAG > imagedefinitions.json

artifacts:
  files:
    - imagedefinitions.json
