version: 0.2

env:
  variables:
    REPOSITORY_URI: 545750752197.dkr.ecr.us-east-1.amazonaws.com/meu-site

phases:
  pre_build:
    commands:
      - echo "Logando no ECR..."
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $REPOSITORY_URI

  build:
    commands:
      - echo "Buildando imagem..."
      - docker build -t meu-site .
      - docker tag meu-site:latest $REPOSITORY_URI:latest

  post_build:
    commands:
      - echo "Enviando imagem..."
      - docker push $REPOSITORY_URI:latest
      - echo "Gerando imagedefinitions.json..."
      - printf '[{"name":"meu-site","imageUri":"%s"}]' $REPOSITORY_URI:latest > imagedefinitions.json

artifacts:
  files:
    - imagedefinitions.json

      post_build:
  commands:
    - echo "Enviando imagem para o ECR..."
    - docker push $REPOSITORY_URI:latest
    - echo "Gerando imagedefinitions.json..."
    - printf '[{"name":"cluster-meu-sitee","imageUri":"%s"}]' $REPOSITORY_URI:latest > imagedefinitions.json

      artifacts:
  files:
    - imagedefinitions.json
